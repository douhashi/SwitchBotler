<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="SwitchBotler app icon">
  <!-- OS アプリ/トレイアイコンのソース。インディゴのグラデタイルに白いマーク。tauri icon の入力に使う。 -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#g)"/>
  <g fill="#FFFFFF" stroke="#FFFFFF" stroke-width="48" stroke-linejoin="round">
    <polygon points="314,410 314,614 470,512"/>
    <polygon points="710,410 710,614 554,512"/>
  </g>
  <circle cx="512" cy="512" r="93" fill="#FFFFFF"/>
</svg>
