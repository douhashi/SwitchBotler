<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260" role="img" aria-label="SwitchBotler — Control your SwitchBot devices from the menu bar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22252E"/>
      <stop offset="1" stop-color="#1D2027"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A2E38"/>
      <stop offset="1" stop-color="#22252E"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="6" dy="6" stdDeviation="7" flood-color="#15171D" flood-opacity="0.9"/>
      <feDropShadow dx="-5" dy="-5" stdDeviation="6" flood-color="#31353F" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- banner background -->
  <rect x="0" y="0" width="1000" height="260" rx="30" fill="url(#bg)"/>

  <!-- raised tile with brand mark -->
  <g filter="url(#soft)">
    <rect x="64" y="74" width="112" height="112" rx="26" fill="url(#tile)"/>
  </g>
  <svg x="88" y="98" width="64" height="64" viewBox="0 0 120 120">
    <g fill="#818CF8" stroke="#818CF8" stroke-width="8" stroke-linejoin="round">
      <polygon points="27,43 27,77 53,60"/>
      <polygon points="93,43 93,77 67,60"/>
    </g>
    <circle cx="60" cy="60" r="15.5" fill="#818CF8"/>
  </svg>

  <!-- wordmark: Switch (near-white) + Botler (indigo) -->
  <text x="212" y="140" font-family="'Plus Jakarta Sans','Segoe UI',ui-sans-serif,system-ui,-apple-system,Roboto,'Helvetica Neue',Arial,sans-serif" font-size="66" font-weight="700" letter-spacing="-1">
    <tspan fill="#EDEFF4">Switch</tspan><tspan fill="#818CF8">Botler</tspan>
  </text>

  <!-- tagline -->
  <text x="214" y="182" font-family="'Plus Jakarta Sans','Segoe UI',ui-sans-serif,system-ui,-apple-system,Roboto,'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="500" fill="#9AA0AF" letter-spacing="0.2">
    Control your SwitchBot devices from the menu bar
  </text>
</svg>
