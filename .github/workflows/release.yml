name: Release

# v* タグの push で 3 OS のインストーラをビルドし、draft Release に添付する（未署名）。
# 成果物が揃う前に公開されないよう draft で作成し、確認後に手動で publish する。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & draft release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS は Intel / Apple Silicon 両対応の universal バイナリ
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # Linux は glibc 互換性重視で 22.04（AppImage の対応幅を広げる）
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf

      # node 24 / rust stable を CI（ci.yml）と同一に揃える
      - uses: jdx/mise-action@v2

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # タグ（vX.Y.Z）を版の唯一のソースにする。tauri.conf.json / package.json へ
      # 実行時に注入するため、事前の手動 bump は不要（＝忘れてもタグと必ず一致する）。
      # ここでの変更は各ランナーのチェックアウト内のみで、コミットは発生しない。
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing version: $VERSION (tag: $GITHUB_REF_NAME)"
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "tauri.conf.json version -> $(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SwitchBotler ${{ github.ref_name }}"
          releaseBody: "各 OS のインストーラをダウンロードしてください。未署名のため、OS のセキュリティ警告が出る場合があります。"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
