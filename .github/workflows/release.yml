name: Release

# v* タグの push で 3 OS のインストーラをビルドし、draft Release に添付する（未署名）。
# 成果物が揃う前に公開されないよう draft で作成し、確認後に手動で publish する。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & draft release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS は Intel / Apple Silicon 両対応の universal バイナリ
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # Linux は glibc 互換性重視で 22.04（AppImage の対応幅を広げる）
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf

      # node 24 / rust stable を CI（ci.yml）と同一に揃える
      - uses: jdx/mise-action@v2

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SwitchBotler ${{ github.ref_name }}"
          releaseBody: "各 OS のインストーラをダウンロードしてください。未署名のため、OS のセキュリティ警告が出る場合があります。"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
