# git hooks 定義。`mise run setup`（= lefthook install）で有効化される。
# コマンドは mise run 経由で実行し、mise 管理のツールチェーン（cargo / node）を確実に使う。
pre-commit:
  parallel: true
  commands:
    rustfmt:
      glob: "src-tauri/**/*.rs"
      run: mise run fmt-check
    typecheck:
      glob: "*.{ts,tsx}"
      run: mise run typecheck
    # フロントのテストは高速なので、変更時にコミット前実行する
    test-front:
      glob: "src/**/*.{ts,tsx}"
      run: mise run test-front

pre-push:
  parallel: true
  commands:
    clippy:
      glob: "src-tauri/**/*.rs"
      run: mise run clippy
    # Rust テストはビルドを伴い低速なので、push 前にまとめて実行する
    test-rust:
      glob: "src-tauri/**/*.rs"
      run: mise run test-rust
